<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Satellite Live Viewer</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>

<body>
  <div id="app">
    <!-- Full screen map container -->
    <div id="map"></div>

    <div class="panel-overlay">
      <header>
        <h1>Live Satellite Tracker</h1>
        <p class="subtitle">Real-time Orbit Tracking</p>
      </header>

      <div class="control-group">
        <label for="trail-slider">Orbit Trail Length: <span id="trail-val">18</span> Hrs</label>
        <input type="range" id="trail-slider" min="1" max="24" value="18" />
      </div>

      <details class="control-group custom-tle-section">
        <summary>Add Custom TLE (2 or 3 lines)</summary>
        <div class="tle-input-container">
          <textarea id="tle-input" rows="3" placeholder="ISS (ZARYA)&#10;1 25544U 98067A   21092.6..."></textarea>
          <button id="add-tle-btn">Add Satellite</button>
        </div>
      </details>

      <div class="list-header">Satellites</div>
      <div id="status-container" class="status-container list-view">
        <!-- Populated by JS with satellite toggles -->
        <p class="loading-text">Fetching satellite data...</p>
      </div>

      <div id="error-banner" class="error-banner hidden">
        <!-- Error messages go here -->
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
